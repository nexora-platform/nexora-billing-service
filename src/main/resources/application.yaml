server:
  port: 8085

spring:
  application:
    name: nexora-billing-service

  datasource:
    url: jdbc:postgresql://localhost:5432/nexora
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka